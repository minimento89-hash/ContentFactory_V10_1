<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Factory V10.1 — Agente Calendario</title>
    <link rel="stylesheet" href="css/soft-corporate.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Instrument+Serif:ital@0;1&family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">
    <script src="js/core/sync-engine.js"></script>
    <script src="js/core/agent-core.js"></script>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* CENTERED HEADER */
        .module-header {
            padding: 60px 20px 30px;
            text-align: center;
            z-index: 100;
            position: relative;
        }
        .module-header h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(3rem, 10vw, 4.2rem);
            margin: 0;
            background: linear-gradient(to bottom, #fff, #555);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            letter-spacing: -0.02em;
        }
        .module-header p {
            color: #444;
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-top: 15px;
            font-weight: 800;
        }

        .back-hub {
            position: fixed;
            top: 40px; left: 40px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 12px 24px;
            border-radius: 50px;
            color: #888;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 800;
            z-index: 1000;
            transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .back-hub:hover { background: #fff; color: #000; border-color: #fff; }

        /* CALENDAR GRID */
        .calendar-container {
            flex: 1;
            padding: 20px 60px 60px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
        }

        .calendar-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }
        .month-label { font-size: 1.4rem; font-weight: 700; color: #fff; }
        .view-toggle { display: flex; gap: 10px; }
        .vt-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #888;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .vt-btn.active { background: #fff; color: #000; border-color: #fff; }

        .calendar-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(20px);
        }

        .grid-header {
            background: rgba(15, 15, 15, 0.8);
            padding: 20px;
            text-align: center;
            font-size: 0.65rem;
            font-weight: 800;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .day-cell {
            background: rgba(10, 10, 10, 0.4);
            padding: 20px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: 0.3s;
            position: relative;
        }
        .day-cell:hover { background: rgba(255,255,255,0.02); }
        .day-num { font-size: 0.9rem; font-weight: 700; color: #444; }
        .day-cell.today .day-num { color: #f43f5e; }

        /* EVENTS */
        .event {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: 0.3s;
        }
        .event:hover { transform: translateX(5px); filter: brightness(1.2); }

        .ev-design { background: rgba(236, 72, 153, 0.1); color: #ec4899; border-color: #ec4899; }
        /* INTERNAL ORBS (V10.1 Standard) */
        .card-orbs {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .c-orb {
            position: absolute;
            width: 150px; height: 150px;
            border-radius: 50%;
            filter: blur(60px);
            animation: card-orb-float 15s infinite alternate;
        }
        @keyframes card-orb-float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 30px); }
        }

        .ev-code { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: #10b981; }
        .ev-launch { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border-color: #f59e0b; }
        .ev-social { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-color: #3b82f6; }

        .background-orbs-container {
            position: fixed;
            inset: 0;
            z-index: 1; /* Above body, below content */
            pointer-events: none;
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5; /* Increased for visibility */
            animation: float-orb 20s infinite alternate ease-in-out;
        }
        @keyframes float-orb { 0% { transform: translate(0,0); } 100% { transform: translate(60px, -40px); } }

        .calendar-container {
            position: relative;
            z-index: 10;
        }

    </style>
</head>
<body>

    <div class="background-orbs-container">
        <!-- Reusing the 20-orb micro-system from Hub for absolute consistency -->
        <div class="bg-orb" style="width:120px;height:120px;top:5%;left:15%;background:radial-gradient(circle,rgba(255,20,147,0.4) 0%,transparent 70%);"></div>
        <div class="bg-orb" style="width:140px;height:140px;top:30%;right:10%;background:radial-gradient(circle,rgba(0,255,127,0.3) 0%,transparent 70%);"></div>
        <div class="bg-orb" style="width:110px;height:110px;top:15%;right:40%;background:radial-gradient(circle,rgba(255,215,0,0.4) 0%,transparent 70%);"></div>
        <div class="bg-orb" style="width:130px;height:130px;top:60%;left:45%;background:radial-gradient(circle,rgba(255,235,59,0.3) 0%,transparent 70%);"></div>
        <div class="bg-orb" style="width:100px;height:100px;top:50%;right:50%;background:radial-gradient(circle,rgba(0,191,255,0.4) 0%,transparent 70%);"></div>
        <div class="bg-orb" style="width:140px;height:140px;bottom:5%;right:5%;background:radial-gradient(circle,rgba(30,144,255,0.35) 0%,transparent 70%);"></div>
        <div class="bg-orb" style="width:150px;height:150px;top:80%;left:5%;background:radial-gradient(circle,rgba(255,20,147,0.2) 0%,transparent 70%);"></div>
    </div>

    <a href="index.html" class="back-hub"><i class="ph ph-house"></i> HUB STRATEGICA</a>

    <header class="module-header">
        <h1>Agente Calendario</h1>
        <p>AUTONOMOUS SCHEDULING V10.1</p>
    </header>

    <main class="calendar-container">
        <div class="calendar-controls">
            <div class="month-label">Marzo 2026</div>
            <div class="view-toggle">
                <button class="vt-btn active">Settimana</button>
                <button class="vt-btn">Mese</button>
            </div>
        </div>

        <div class="calendar-grid" id="calendar-grid">
            <div class="card-orbs">
                <div class="c-orb" style="top:20%; left:10%; background: rgba(244,63,94,0.15);"></div>
                <div class="c-orb" style="bottom:20%; right:10%; background: rgba(139, 92, 246, 0.15);"></div>
            </div>
            <!-- Header -->
            <div class="grid-header">Lun</div>
            <div class="grid-header">Mar</div>
            <div class="grid-header">Mer</div>
            <div class="grid-header">Gio</div>
            <div class="grid-header">Ven</div>
            <div class="grid-header">Sab</div>
            <div class="grid-header">Dom</div>

            <!-- Week Row -->
            <div class="day-cell">
                <div class="day-num">23</div>
                <div class="event ev-code">Refactor Neural Map</div>
            </div>
            <div class="day-cell">
                <div class="day-num">24</div>
                <div class="event ev-design">Concept V10.1 UI</div>
            </div>
            <div class="day-cell">
                <div class="day-num">25</div>
                <div class="event ev-code">Logic Flows Beta</div>
                <div class="event ev-social">IG Post: The Factory</div>
            </div>
            <div class="day-cell today">
                <div class="day-num">26</div>
                <div class="event ev-launch">Phase 3 Kickoff</div>
                <div class="event ev-code">Sync Engine Deploy</div>
            </div>
            <div class="day-cell">
                <div class="day-num">27</div>
                <div class="event ev-design">Agente Calendario UI</div>
            </div>
            <div class="day-cell">
                <div class="day-num">28</div>
                <div class="event ev-social">Livestream Prep</div>
            </div>
            <div class="day-cell">
                <div class="day-num">29</div>
            </div>
        </div>
    </main>

    <script>
        // Sync Logic
        AgentCore.listen('stateUpdate', () => {
            console.log("[AgenteCalendario] Ecosystem state updated. Recalibrating deadlines...");
        });
    </script>
</body>
</html>
