<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Factory V10.1 — Calendario</title>
    <script>
        const isAuth = localStorage.getItem('v10_auth') === 'true' || sessionStorage.getItem('v10_auth') === 'true';
        if (!isAuth) window.location.href = 'auth/login.html';
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Instrument+Serif:ital@0;1&family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/cf-theme.css">
    <style>
        body { background:#050505; height:100vh; overflow:hidden; display:flex; flex-direction:column; }

        /* TOPBAR */
        .topbar {
            position:sticky; top:0; z-index:100;
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 32px;
            background:rgba(5,5,5,0.9); backdrop-filter:blur(20px);
            border-bottom:1px solid rgba(255,255,255,0.07);
            flex-shrink:0;
        }
        .topbar-left { display:flex; align-items:center; gap:14px; }
        .topbar-icon { width:38px; height:38px; border-radius:10px; background:rgba(6,182,212,0.12); border:1px solid rgba(6,182,212,0.2); display:flex; align-items:center; justify-content:center; color:#67e8f9; font-size:1.1rem; }
        .topbar-title { font-family:'Instrument Serif',serif; font-size:1.1rem; color:#fff; }
        .topbar-sub { font-family:'Fira Code',monospace; font-size:0.57rem; color:#555; text-transform:uppercase; letter-spacing:2px; margin-top:1px; }

        /* CONTENT */
        .cal-wrap { flex:1; overflow:hidden; display:flex; flex-direction:column; padding:24px 32px; gap:18px; position:relative; z-index:10; }

        /* CONTROLS */
        .cal-controls { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .cal-nav { display:flex; align-items:center; gap:12px; }
        .nav-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#aaa; width:34px; height:34px; border-radius:8px; cursor:pointer; font-size:0.9rem; display:flex; align-items:center; justify-content:center; transition:.2s; }
        .nav-btn:hover { background:rgba(255,255,255,0.1); color:#fff; }
        .month-label { font-family:'Instrument Serif',serif; font-size:1.4rem; color:#fff; }
        .view-row { display:flex; gap:6px; }
        .vt-btn { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); color:#888; padding:7px 16px; border-radius:8px; font-size:0.72rem; font-weight:700; cursor:pointer; transition:.2s; font-family:'DM Sans',sans-serif; }
        .vt-btn.active { background:rgba(255,255,255,0.1); color:#fff; border-color:rgba(255,255,255,0.2); }

        /* CALENDAR GRID */
        .cal-grid {
            flex:1; display:grid; grid-template-columns:repeat(7,1fr);
            gap:1px; background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.08); border-radius:18px; overflow:hidden;
        }
        .grid-hdr { background:rgba(10,10,10,0.9); padding:14px; text-align:center; font-family:'Fira Code',monospace; font-size:0.6rem; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:3px; border-bottom:1px solid rgba(255,255,255,0.05); }

        .day-cell { background:rgba(8,8,8,0.5); padding:14px; display:flex; flex-direction:column; gap:6px; transition:.2s; cursor:pointer; }
        .day-cell:hover { background:rgba(255,255,255,0.03); }
        .day-cell.today { background:rgba(6,182,212,0.04); }
        .day-cell.other-month .day-num { color:#333; }
        .day-num { font-size:0.85rem; font-weight:700; color:#555; width:26px; height:26px; display:flex; align-items:center; justify-content:center; border-radius:50%; flex-shrink:0; }
        .day-cell.today .day-num { background:rgba(6,182,212,0.2); color:#67e8f9; }

        .event { padding:5px 8px; border-radius:6px; font-size:0.67rem; font-weight:700; border-left:2px solid transparent; cursor:pointer; transition:.2s; line-height:1.3; }
        .event:hover { opacity:0.8; transform:translateX(2px); }
        .ev-design { background:rgba(236,72,153,0.1); color:#f9a8d4; border-color:#ec4899; }
        .ev-code   { background:rgba(16,185,129,0.1);  color:#6ee7b7; border-color:#10b981; }
        .ev-launch { background:rgba(255,215,0,0.08);  color:#fcd34d; border-color:#ffd700; }
        .ev-social { background:rgba(59,130,246,0.1);  color:#93c5fd; border-color:#3b82f6; }
        .ev-ai     { background:rgba(168,85,247,0.1);  color:#d8b4fe; border-color:#a855f7; }

        /* ADD EVENT MODAL */
        .modal-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal { background:#0e0e0e; border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:28px; width:360px; }
        .modal h3 { font-family:'Instrument Serif',serif; font-size:1.2rem; margin-bottom:20px; }
        .modal-input { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:10px 14px; color:#fff; font-size:0.85rem; margin-bottom:12px; font-family:'DM Sans',sans-serif; outline:none; }
        .modal-input:focus { border-color:rgba(6,182,212,0.5); }
        .modal-row { display:flex; gap:8px; }
        .modal-btn { flex:1; padding:10px; border-radius:10px; font-weight:700; font-size:0.8rem; cursor:pointer; border:none; font-family:'DM Sans',sans-serif; transition:.2s; }
        .modal-cancel { background:rgba(255,255,255,0.06); color:#888; }
        .modal-save { background:#06b6d4; color:#000; }
    </style>
</head>
<body>

<!-- ORBS -->
<div class="cf-orbs" id="orbsBg"></div>

<!-- TOPBAR -->
<div class="topbar">
    <div class="topbar-left">
        <div class="topbar-icon"><i class="ph-fill ph-calendar"></i></div>
        <div>
            <div class="topbar-title">Agente Calendario</div>
            <div class="topbar-sub">Content Factory V10.1 · Scheduling</div>
        </div>
    </div>
    <a href="index.html" class="btn-hub"><i class="ph ph-arrow-left"></i> Hub Strategico</a>
</div>

<!-- CALENDAR -->
<div class="cal-wrap">

    <div class="cal-controls">
        <div class="cal-nav">
            <button class="nav-btn" onclick="prevMonth()"><i class="ph ph-caret-left"></i></button>
            <div class="month-label" id="monthLabel">—</div>
            <button class="nav-btn" onclick="nextMonth()"><i class="ph ph-caret-right"></i></button>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
            <div class="view-row">
                <button class="vt-btn active" onclick="setView('week',this)">Settimana</button>
                <button class="vt-btn" onclick="setView('month',this)">Mese</button>
            </div>
            <button class="btn-ghost" onclick="openAdd()" style="gap:6px;"><i class="ph-fill ph-plus"></i> Evento</button>
        </div>
    </div>

    <div class="cal-grid" id="calGrid"></div>

</div>

<!-- ADD EVENT MODAL -->
<div class="modal-overlay" id="addModal">
    <div class="modal">
        <h3>📅 Nuovo Evento</h3>
        <input class="modal-input" id="evTitle" placeholder="Titolo evento..." />
        <input class="modal-input" type="date" id="evDate" />
        <select class="modal-input" id="evType">
            <option value="ev-code">💻 Sviluppo</option>
            <option value="ev-design">🎨 Design</option>
            <option value="ev-social">📱 Social</option>
            <option value="ev-launch">🚀 Launch</option>
            <option value="ev-ai">🤖 AI / Agenti</option>
        </select>
        <div class="modal-row">
            <button class="modal-btn modal-cancel" onclick="closeAdd()">Annulla</button>
            <button class="modal-btn modal-save" onclick="saveEvent()">Salva</button>
        </div>
    </div>
</div>

<script>
// Init orbs
(function(){
    const bg = document.getElementById('orbsBg');
    const colors = ['#ffd700','#06b6d4','#3b82f6','#10b981','#8b5cf6','#f97316'];
    for(let i=0;i<16;i++){
        const o=document.createElement('div');
        o.className='cf-orb';
        const s=150+Math.random()*280;
        o.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*110-5}%;top:${Math.random()*110-5}%;background:radial-gradient(circle,${colors[i%colors.length]}20 0%,transparent 70%);animation-duration:${12+Math.random()*16}s;animation-delay:-${Math.random()*20}s;`;
        bg.appendChild(o);
    }
})();

// Calendar state
let curYear, curMonth, curView='week';
const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAYS_IT = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

// Load events from localStorage
function loadEvents() {
    try { return JSON.parse(localStorage.getItem('cf_calendar_events') || '[]'); } catch(e) { return []; }
}
function saveEvents(evs) {
    localStorage.setItem('cf_calendar_events', JSON.stringify(evs));
}

// Seed default events if empty
function seedEvents() {
    if(loadEvents().length > 0) return;
    const now = new Date();
    const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0');
    saveEvents([
        { id:1, title:'Refactor Neural Map', date:`${y}-${m}-03`, type:'ev-code' },
        { id:2, title:'Concept V10.1 UI', date:`${y}-${m}-05`, type:'ev-design' },
        { id:3, title:'Logic Flows Beta', date:`${y}-${m}-10`, type:'ev-code' },
        { id:4, title:'IG Post: The Factory', date:`${y}-${m}-10`, type:'ev-social' },
        { id:5, title:'Phase 3 Kickoff', date:`${y}-${m}-15`, type:'ev-launch' },
        { id:6, title:'Sync Engine Deploy', date:`${y}-${m}-15`, type:'ev-ai' },
        { id:7, title:'Agente Calendario UI', date:`${y}-${m}-17`, type:'ev-design' },
        { id:8, title:'Livestream Prep', date:`${y}-${m}-22`, type:'ev-social' },
    ]);
}

function renderMonth(y, m) {
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    document.getElementById('monthLabel').textContent = MONTHS[m] + ' ' + y;

    // Headers
    DAYS_IT.forEach(d => {
        const h = document.createElement('div');
        h.className = 'grid-hdr';
        h.textContent = d;
        grid.appendChild(h);
    });

    const first = new Date(y, m, 1);
    let startDay = first.getDay(); // 0=dom
    startDay = startDay === 0 ? 6 : startDay - 1; // convert to Mon=0

    const daysInMonth = new Date(y, m+1, 0).getDate();
    const today = new Date();
    const events = loadEvents();

    // Prev month padding
    const prevDays = new Date(y, m, 0).getDate();
    for(let i = startDay-1; i >= 0; i--) {
        const cell = makeCell(prevDays-i, y, m-1, false, events);
        cell.classList.add('other-month');
        grid.appendChild(cell);
    }

    // This month
    for(let d = 1; d <= daysInMonth; d++) {
        const cell = makeCell(d, y, m, true, events);
        const isToday = today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;
        if(isToday) cell.classList.add('today');
        grid.appendChild(cell);
    }

    // Fill remaining
    const total = startDay + daysInMonth;
    const rem = 7 - (total % 7);
    if(rem < 7) {
        for(let d = 1; d <= rem; d++) {
            const cell = makeCell(d, y, m+1, false, events);
            cell.classList.add('other-month');
            grid.appendChild(cell);
        }
    }
}

function makeCell(day, y, m, thisMonth, events) {
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    const dn = document.createElement('div');
    dn.className = 'day-num';
    dn.textContent = day;
    cell.appendChild(dn);

    if(thisMonth) {
        const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        events.filter(e => e.date === dateStr).forEach(ev => {
            const el = document.createElement('div');
            el.className = `event ${ev.type}`;
            el.textContent = ev.title;
            cell.appendChild(el);
        });
    }
    return cell;
}

function prevMonth() { curMonth--; if(curMonth<0){curMonth=11;curYear--;} renderMonth(curYear,curMonth); }
function nextMonth() { curMonth++; if(curMonth>11){curMonth=0;curYear++;} renderMonth(curYear,curMonth); }
function setView(v, btn) {
    curView=v;
    document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderMonth(curYear,curMonth);
}

function openAdd() {
    const now = new Date();
    document.getElementById('evDate').value = now.toISOString().split('T')[0];
    document.getElementById('addModal').classList.add('open');
}
function closeAdd() { document.getElementById('addModal').classList.remove('open'); }
function saveEvent() {
    const title = document.getElementById('evTitle').value.trim();
    const date  = document.getElementById('evDate').value;
    const type  = document.getElementById('evType').value;
    if(!title||!date) return;
    const evs = loadEvents();
    evs.push({ id:Date.now(), title, date, type });
    saveEvents(evs);
    closeAdd();
    renderMonth(curYear,curMonth);
    document.getElementById('evTitle').value='';
}

// Init
seedEvents();
const now = new Date();
curYear = now.getFullYear();
curMonth = now.getMonth();
renderMonth(curYear, curMonth);
</script>

</body>
</html>
