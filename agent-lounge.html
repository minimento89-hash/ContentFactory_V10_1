<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Lounge — Content Factory V10.1</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Instrument+Serif:ital@0;1&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="js/core/agent-core.js"></script>
    <script src="js/core/ui-engine.js"></script>
    
    <style>
        :root {
            --accent: #ffd700;
            --bg: #050505;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f0;
            --text-dim: #555;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 20-ORB BACKGROUND */
        .orb-bg {
            position: fixed; inset: 0; z-index: -1;
            background: #000; overflow: hidden;
        }
        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.12;
            animation: orbFloat 30s infinite alternate ease-in-out;
        }
        @keyframes orbFloat {
            from { transform: translate(0,0) scale(1); }
            to { transform: translate(120px, 60px) scale(1.4); }
        }

        /* HEADER */
        .header {
            padding: 40px 40px 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }
        .header-title h1 { font-family: 'Instrument Serif', serif; font-size: 3rem; line-height: 1; }
        .header-title p { font-family: 'Fira Code', monospace; font-size: 0.6rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.4em; margin-top: 8px; }

        .btn-hub {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 10px 20px; border-radius: 30px; color: #fff; text-decoration: none;
            font-size: 0.75rem; font-weight: 700; transition: 0.3s;
        }
        .btn-hub:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.3); }

        /* MAIN CONTENT */
        main {
            flex: 1; display: flex; padding: 20px 40px 40px; gap: 30px; overflow: hidden;
        }

        /* AGENT GRID */
        .agent-grid {
            flex: 2; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; overflow-y: auto; padding-right: 15px;
        }
        .agent-card {
            background: var(--surface); backdrop-filter: blur(40px);
            border: 1px solid var(--border); border-radius: 28px;
            padding: 28px; display: flex; flex-direction: column; gap: 20px;
            position: relative; transition: 0.4s;
        }
        .agent-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-5px); }

        .card-top { display: flex; align-items: center; gap: 15px; }
        .a-icon {
            width: 48px; height: 48px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
        }
        .a-info h3 { font-size: 1.1rem; font-weight: 800; }
        .a-info span { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; }

        .pulse {
            position: absolute; top: 25px; right: 25px; width: 8px; height: 8px;
            border-radius: 50%; animation: pulseAnim 1.5s infinite;
        }
        @keyframes pulseAnim { 0% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.4); } 100% { opacity: 0.4; transform: scale(1); } }

        .a-status {
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05);
            padding: 6px 14px; border-radius: 15px; font-size: 0.6rem; color: #888; width: fit-content;
        }
        .a-msg {
            background: rgba(255,255,255,0.02); border-left: 3px solid #333;
            padding: 15px; border-radius: 4px 12px 12px 4px; font-size: 0.75rem; color: #bbb; font-style: italic;
        }

        /* CHAT SIDEBAR */
        .chat-sidebar {
            flex: 1; background: rgba(10,10,10,0.5); backdrop-filter: blur(60px);
            border: 1px solid var(--border); border-radius: 32px;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-header {
            padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-header h4 { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 800; }
        
        .chat-messages {
            flex: 1; padding: 25px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }
        .msg-row { display: flex; gap: 12px; max-width: 95%; animation: msgPop 0.3s ease-out; }
        @keyframes msgPop { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: none; } }
        .msg-avatar { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
        .msg-bubble { background: rgba(255,255,255,0.03); padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .msg-bubble strong { display: block; font-size: 0.6rem; color: #777; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
        .msg-bubble p { margin:0; font-size: 0.75rem; line-height: 1.45; color: #ccc; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
    </style>
</head>
<body>

<div class="orb-bg" id="orb-container"></div>

<header class="header">
    <div class="header-title">
        <h1>Agent Lounge</h1>
        <p>Collaborative Agency — V10.1</p>
    </div>
    <a href="index.html" class="btn-hub">← Hub Strategico</a>
</header>

<main>
    <div class="agent-grid" id="agent-grid">
        <!-- Dynamic Agents -->
    </div>

    <aside class="chat-sidebar">
        <div class="chat-header">
            <h4>Live Internal Feed</h4>
            <div style="width:10px; height:10px; border-radius:50%; background:#10b981; box-shadow:0 0 10px #10b981;"></div>
        </div>
        <div class="chat-messages" id="chat-messages">
            <!-- Inter-agent communication messages -->
        </div>
    </aside>
</main>

<script>
    // 20-ORB ENGINE
    const orbContainer = document.getElementById('orb-container');
    const colors = ['#ffd700', '#ec4899', '#8b5cf6', '#3b82f6'];
    for (let i = 0; i < 20; i++) {
        const orb = document.createElement('div');
        orb.className = 'orb';
        const size = Math.random() * 400 + 200;
        orb.style.width = size + 'px';
        orb.style.height = size + 'px';
        orb.style.left = Math.random() * 100 + '%';
        orb.style.top = Math.random() * 100 + '%';
        orb.style.background = colors[Math.floor(Math.random() * colors.length)];
        orb.style.animationDelay = (Math.random() * 10) + 's';
        orbContainer.appendChild(orb);
    }

    // LOUNGE RENDER ENGINE
    function renderLounge() {
        const agents = AgentCore.state.agents;
        const grid = document.getElementById('agent-grid');
        grid.innerHTML = '';

        Object.entries(agents).forEach(([id, agent]) => {
            const card = document.createElement('div');
            card.className = 'agent-card';
            
            const lastTask = AgentCore.state.tasks.filter(t => t.from === id || t.to === id).pop();
            const statusMsg = lastTask ? `Ultima Task: ${lastTask.title}` : "In attesa di istruzioni.";

            card.innerHTML = `
                <div class="pulse" style="background:${agent.color}; box-shadow: 0 0 15px ${agent.color}"></div>
                <div class="card-top">
                    <div class="a-icon" style="background:${agent.color}15; color:${agent.color}; border:1px solid ${agent.color}30;">
                        <i class="ph-fill ${agent.icon || 'ph-cpu'}"></i>
                    </div>
                    <div class="a-info">
                        <h3>${agent.name}</h3>
                        <span>${agent.tag}</span>
                    </div>
                </div>
                <div class="a-status">${agent.operationalState} — ${agent.status}</div>
                <div class="a-msg">"${statusMsg}"</div>
                <div style="margin-top:auto; font-size:0.6rem; color:#444; font-family:'Fira Code', monospace;">
                    SKILL: ${agent.projects[0] || 'Idle'}
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // CHAT FEED ENGINE
    function addChatMessage(name, icon, color, text) {
        const messages = document.getElementById('chat-messages');
        const msg = document.createElement('div');
        msg.className = 'msg-row';
        msg.innerHTML = `
            <div class="msg-avatar" style="background:${color}20; color:${color};"><i class="ph-fill ${icon}"></i></div>
            <div class="msg-bubble">
                <strong>${name}</strong>
                <p>${text}</p>
            </div>
        `;
        messages.appendChild(msg);
        messages.scrollTop = messages.scrollHeight;
        if(messages.children.length > 20) messages.children[0].remove();
    }

    // REACTIVE SYNC
    window.addEventListener('agent:taskNew', e => {
        const t = e.detail;
        const fromA = AgentCore.state.agents[t.from] || { name: 'Il Capo', color: '#ffd700', icon: 'ph-user' };
        addChatMessage(fromA.name, fromA.icon || 'ph-user', fromA.color, `Ho assegnato un nuovo compito a ${t.to}: "${t.title}"`);
        renderLounge();
    });

    window.addEventListener('agent:taskCompleted', e => {
        const t = e.detail;
        const toA = AgentCore.state.agents[t.to] || { name: 'Agent', color: '#888', icon: 'ph-cpu' };
        addChatMessage(toA.name, toA.icon || 'ph-user', toA.color, `Ho completato la task: "${t.title}". Report pronto.`);
        renderLounge();
    });

    // Initial load
    window.addEventListener('load', () => {
        renderLounge();
        // Initial mock dialogue
        addChatMessage('Cipher', 'ph-shield-check', '#ffd700', 'Tutti i moduli di sicurezza sono operativi.');
        addChatMessage('Olivia', 'ph-paint-brush-broad', '#ec4899', 'Pronta a generare nuovi asset creative.');
    });
</script>
</body>
</html>
