<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Factory V10.1 — Brainstorming Lab</title>
    <link rel="stylesheet" href="css/soft-corporate.css">
    <script>
        // Content Factory V10.1 — Rigid Gatekeeper
        const isAuth = localStorage.getItem('v10_auth') === 'true' || sessionStorage.getItem('v10_auth') === 'true';
        if (!isAuth) window.location.href = 'auth/login.html';
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Instrument+Serif:ital@0;1&family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">
    <script src="js/core/sync-engine.js"></script>
    <script src="js/core/agent-core.js"></script>
    <script src="js/core/ui-engine.js"></script>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* CENTERED HEADER (V10.1 Standard) */
        .module-header {
            padding: 60px 20px 40px;
            text-align: center;
            z-index: 100;
            position: relative;
        }

        .module-header h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(3rem, 10vw, 4.5rem);
            margin: 0;
            background: linear-gradient(to bottom, #fff, #555);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .module-header p {
            color: #444;
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-top: 15px;
            font-weight: 800;
        }

        .back-hub {
            position: fixed;
            top: 40px; left: 40px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 12px 24px;
            border-radius: 50px;
            color: #888;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 800;
            z-index: 1000;
            transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .back-hub:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.3); transform: translateX(-3px); }

        /* BRAINSTORMING CANVAS */
        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #constellation-svg {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* INTERNAL ORBS */
        .card-orbs {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .c-orb {
            position: absolute;
            width: 150px; height: 150px;
            border-radius: 50%;
            filter: blur(60px);
            animation: card-orb-float 15s infinite alternate;
        }
        @keyframes card-orb-float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 30px); }
        }

        .canvas-container {
            position: relative;
            z-index: 10;
        }
        .idea-node {
            position: absolute;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            z-index: 10;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            animation: nodePop 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes nodePop { from { opacity:0; transform: scale(0.8); } to { opacity:1; transform: scale(1); } }

        .idea-node:hover {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            transform: translateY(-5px);
        }

        .idea-node.central {
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid #ffd70044;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .idea-icon {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }

        /* INPUT BAR */
        .input-hub {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            background: rgba(15,15,15,0.8);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 40px;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .input-hub input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 0.9rem;
            padding: 10px 0;
            outline: none;
        }

        .input-hub button {
            background: #fff;
            color: #000;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }
        .input-hub button:hover { transform: scale(1.05); background: #ffd700; }

        @keyframes float-orb { 0% { transform: translate(0,0); } 100% { transform: translate(60px, -40px); } }

    </style>
</head>
<body>

    <div data-master-template>
        <div class="master-card" style="display:none;"></div> <!-- Invisible hook for Back Button -->

    </div>

    <header class="module-header">
        <h1>Brainstorming</h1>
        <p>AI-POWERED IDEATION SPACE V10.1</p>
    </header>

    <main class="canvas-container" id="canvas">
        <div class="card-orbs">
            <div class="c-orb" style="top:10%; left:10%; background: rgba(255,215,0,0.15);"></div>
            <div class="c-orb" style="bottom:10%; right:10%; background: rgba(16,185,129,0.15);"></div>
        </div>
        <svg id="constellation-svg"></svg>
        
        <div id="ideas-layer">
            <div class="idea-node central" id="central-idea" style="top: 50%; left: 50%; transform: translate(-50%, -50%);">
                <div class="idea-icon" style="color: #ffd700;"><i class="ph ph-sparkle"></i></div>
                <span>Digit Topic to Start</span>
            </div>
        </div>

        <div class="input-hub">
            <i class="ph-bold ph-magnifying-glass" style="color: #444;"></i>
            <input type="text" id="topic-input" placeholder="Di cosa vuoi parlare? (es: Content Strategy 2026)">
            <button onclick="generateIdeas()">GENERA</button>
        </div>
    </main>

    <script>
        const ideasLayer = document.getElementById('ideas-layer');
        const svg = document.getElementById('constellation-svg');
        const input = document.getElementById('topic-input');
        const centralNode = document.getElementById('central-idea');

        let childNodes = [];

        function generateIdeas() {
            const topic = input.value;
            if(!topic) return;

            // Clear old ideas
            childNodes.forEach(node => node.remove());
            childNodes = [];
            svg.innerHTML = '';

            // Update Central
            centralNode.querySelector('span').innerText = topic.toUpperCase();

            // Mock AI Suggestions from Aura
            const suggestions = [
                { txt: "Viral Aesthetics", icon: "ph-camera", color: "#ec4899" },
                { txt: "Interactive Reels", icon: "ph-play-circle", color: "#3b82f6" },
                { txt: "Neural Branding", icon: "ph-brain", color: "#10b981" },
                { txt: "Minimalist UX", icon: "ph-layout", color: "#ffd700" },
                { txt: "Social Loops", icon: "ph-arrows-clockwise", color: "#a855f7" }
            ];

            suggestions.forEach((item, index) => {
                const angle = (index / suggestions.length) * Math.PI * 2;
                const radius = 250;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                createIdeaNode(item, x, y);
            });

            setTimeout(drawConnections, 100);
        }

        function createIdeaNode(data, x, y) {
            const node = document.createElement('div');
            node.className = 'idea-node';
            node.style.left = `calc(50% + ${x}px)`;
            node.style.top = `calc(50% + ${y}px)`;
            node.style.transform = 'translate(-50%, -50%)';

            node.innerHTML = `
                <div class="idea-icon" style="background:${data.color}20; color:${data.color}; border:1px solid ${data.color}30;">
                    <i class="ph ${data.icon}"></i>
                </div>
                <span>${data.txt}</span>
            `;

            ideasLayer.appendChild(node);
            childNodes.push(node);
        }

        function drawConnections() {
            svg.innerHTML = '';
            const cRect = centralNode.getBoundingClientRect();
            const cx = cRect.left + cRect.width/2;
            const cy = cRect.top + cRect.height/2;

            childNodes.forEach(child => {
                const r = child.getBoundingClientRect();
                const x2 = r.left + r.width/2;
                const y2 = r.top + r.height/2;

                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", cx);
                line.setAttribute("y1", cy);
                line.setAttribute("x2", x2);
                line.setAttribute("y2", y2);
                line.setAttribute("stroke", "rgba(255,255,255,0.1)");
                line.setAttribute("stroke-width", "1");
                line.setAttribute("stroke-dasharray", "4 4");
                svg.appendChild(line);
            });
        }

        window.addEventListener('resize', drawConnections);
    </script>
</body>
</html>
