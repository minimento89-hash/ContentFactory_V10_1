<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Flows — Content Factory V10.1</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Instrument+Serif:ital@0;1&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="js/core/agent-core.js"></script>
    <script src="js/core/ui-engine.js"></script>
    
    <style>
        :root {
            --accent: #ffd700;
            --bg: #050505;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f0;
            --text-dim: #555;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        /* 20-ORB BACKGROUND */
        .orb-bg {
            position: fixed; inset: 0; z-index: -1;
            background: #000; overflow: hidden;
        }
        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(100px); opacity: 0.1;
            animation: orbFloat 35s infinite alternate ease-in-out;
        }
        @keyframes orbFloat { from { transform: translate(0,0) scale(1); } to { transform: translate(100px, 80px) scale(1.3); } }

        /* SIDEBAR (PALETTE) */
        .sidebar {
            width: 340px; background: rgba(10,10,10,0.6); backdrop-filter: blur(60px);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            padding: 40px; z-index: 100;
        }
        .sidebar h1 { font-family: 'Instrument Serif', serif; font-size: 2.2rem; line-height: 1; margin-bottom: 8px; }
        .sidebar p { font-family: 'Fira Code', monospace; font-size: 0.6rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.3em; margin-bottom: 40px; }

        .palette-section { margin-bottom: 30px; }
        .palette-label { font-size: 0.65rem; color: #666; text-transform: uppercase; font-weight: 800; letter-spacing: 0.1em; margin-bottom: 15px; display: block; }
        
        .palette-item {
            background: var(--surface); border: 1px solid var(--border);
            padding: 16px 20px; border-radius: 16px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 12px; cursor: grab;
            transition: 0.3s; font-size: 0.85rem; color: #aaa;
        }
        .palette-item:hover { background: rgba(255,255,255,0.06); border-color: var(--accent); color: #fff; }
        .palette-item i { font-size: 1.2rem; color: var(--accent); }

        /* CANVAS */
        .canvas-area {
            flex: 1; position: relative; overflow: hidden;
            background: radial-gradient(circle at center, rgba(5,5,5,0.5) 0%, transparent 100%);
            z-index: 10;
        }
        .grid-bg { 
            position: absolute; inset: 0; 
            background-image: linear-gradient(rgba(255,255,255,0.03) 1.5px, transparent 1.5px), linear-gradient(90deg, rgba(255,255,255,0.03) 1.5px, transparent 1.5px); 
            background-size: 50px 50px; z-index: 0; 
        }
        #flow-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* NODES */
        .node {
            position: absolute; min-width: 220px;
            background: rgba(20,20,20,0.4); backdrop-filter: blur(40px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 24px; cursor: grab; z-index: 20;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .node:active { cursor: grabbing; border-color: var(--accent); }
        .node-hdr { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; font-weight: 700; font-size: 0.9rem; }
        .node-hdr i { font-size: 1.4rem; color: var(--accent); }
        .node-desc { font-size: 0.75rem; color: #888; line-height: 1.5; }

        .node-port {
            position: absolute; width: 12px; height: 12px;
            background: var(--bg); border: 2px solid var(--accent);
            border-radius: 50%;
        }
        .port-out { right: -6px; top: 50%; transform: translateY(-50%); }
        .port-in { left: -6px; top: 50%; transform: translateY(-50%); }

        .btn-save {
            margin-top: auto; background: var(--surface); border: 1px solid var(--border);
            color: #fff; padding: 14px; border-radius: 50px; font-size: 0.75rem;
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn-save:hover { background: #fff; color: #000; }

        .back-hub {
            position: fixed; top: 30px; right: 40px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 8px 18px; border-radius: 30px; color: #fff; text-decoration: none;
            font-size: 0.7rem; font-weight: 700; z-index: 1000;
        }
        .back-hub:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.3); transform: translateX(-3px); }
    </style>
</head>
<body>

<div class="orb-bg" id="orb-container"></div>

<div class="sidebar">
    <h1>Logic Flows</h1>
    <p>Strategic Creative Engine</p>

    <div class="palette-section">
        <span class="palette-label">Trigger Nodes</span>
        <div class="palette-item" draggable="true" ondragstart="onDragStart(event, 'trigger', 'Post Published', 'ph-lightning')">
            <i class="ph ph-lightning"></i> Post Published
        </div>
        <div class="palette-item" draggable="true" ondragstart="onDragStart(event, 'trigger', 'Sentiment Spike', 'ph-chart-line-up')">
            <i class="ph ph-chart-line-up"></i> Sentiment Spike
        </div>
    </div>

    <div class="palette-section">
        <span class="palette-label">Action Nodes</span>
        <div class="palette-item" draggable="true" ondragstart="onDragStart(event, 'action', 'Generate Asset', 'ph-magic-wand')">
            <i class="ph ph-magic-wand"></i> Generate Asset
        </div>
        <div class="palette-item" draggable="true" ondragstart="onDragStart(event, 'action', 'Agent Research', 'ph-magnifying-glass')">
            <i class="ph ph-magnifying-glass"></i> Agent Research
        </div>
    </div>

    <button class="btn-save" onclick="AgentCore.broadcast('flowSaved', { nodes: 2 })">Save Strategic Flow</button>
</div>

<main class="canvas-area" id="canvas" ondragover="event.preventDefault()" ondrop="onDrop(event)">
    <div class="grid-bg"></div>
    <a href="index.html" class="back-hub">← Hub Strategico</a>
    <svg id="flow-svg"></svg>

    <!-- Initial Node -->
    <div class="node" style="top: 250px; left: 100px;" id="node-1">
        <div class="node-hdr"><i class="ph ph-play-circle"></i> Campaign Start</div>
        <div class="node-desc">Triggered when a new Content Factory roadmap phase is activated.</div>
        <div class="node-port port-out"></div>
    </div>
</main>

<script>
    // 20-ORB ENGINE
    const orbContainer = document.getElementById('orb-container');
    const colors = ['#ffd700', '#ec4899', '#8b5cf6', '#3b82f6'];
    for (let i = 0; i < 20; i++) {
        const orb = document.createElement('div');
        orb.className = 'orb';
        const size = Math.random() * 400 + 300;
        orb.style.width = size + 'px'; orb.style.height = size + 'px';
        orb.style.left = Math.random() * 100 + '%'; orb.style.top = Math.random() * 100 + '%';
        orb.style.background = colors[Math.floor(Math.random() * colors.length)];
        orbContainer.appendChild(orb);
    }

    let draggedEl = null;
    let offset = { x: 0, y: 0 };

    function onDragStart(e, type, title, icon) {
        e.dataTransfer.setData('type', type);
        e.dataTransfer.setData('title', title);
        e.dataTransfer.setData('icon', icon);
    }

    function onDrop(e) {
        const type = e.dataTransfer.getData('type');
        const title = e.dataTransfer.getData('title');
        const icon = e.dataTransfer.getData('icon');
        
        const canvasRect = document.getElementById('canvas').getBoundingClientRect();
        const x = e.clientX - canvasRect.left;
        const y = e.clientY - canvasRect.top;

        createNode(title, icon, x, y);
    }

    function createNode(title, icon, x, y) {
        const node = document.createElement('div');
        node.className = 'node';
        node.style.left = x + 'px';
        node.style.top = y + 'px';
        const id = 'node-' + Date.now();
        node.id = id;

        node.innerHTML = `
            <div class="node-hdr"><i class="ph ${icon}"></i> ${title}</div>
            <div class="node-desc">Automated logic handled by the Strategic Creative Engine component.</div>
            <div class="node-port port-in"></div>
            <div class="node-port port-out"></div>
        `;

        node.addEventListener('mousedown', (e) => {
            draggedEl = node;
            const rect = node.getBoundingClientRect();
            offset.x = e.clientX - rect.left;
            offset.y = e.clientY - rect.top;
        });

        document.getElementById('canvas').appendChild(node);
        drawPaths();
    }

    window.addEventListener('mousemove', (e) => {
        if (!draggedEl) return;
        const canvasRect = document.getElementById('canvas').getBoundingClientRect();
        draggedEl.style.left = (e.clientX - offset.x - canvasRect.left) + 'px';
        draggedEl.style.top = (e.clientY - offset.y) + 'px';
        drawPaths();
    });

    window.addEventListener('mouseup', () => { draggedEl = null; });

    function drawPaths() {
        const svg = document.getElementById('flow-svg');
        svg.innerHTML = '';
        const nodes = document.querySelectorAll('.node');
        const canvasRect = document.getElementById('canvas').getBoundingClientRect();

        // Simple linear drawing for demonstration
        for(let i=0; i < nodes.length - 1; i++) {
            const n1 = nodes[i];
            const n2 = nodes[i+1];
            const r1 = n1.getBoundingClientRect();
            const r2 = n2.getBoundingClientRect();

            const x1 = r1.left + r1.width - canvasRect.left;
            const y1 = r1.top + r1.height/2 - canvasRect.top;
            const x2 = r2.left - canvasRect.left;
            const y2 = r2.top + r2.height/2 - canvasRect.top;

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const cp1x = x1 + (x2 - x1) / 2;
            const d = `M ${x1} ${y1} C ${cp1x} ${y1}, ${cp1x} ${y2}, ${x2} ${y2}`;
            path.setAttribute("d", d);
            path.setAttribute("stroke", "rgba(255,215,0,0.2)");
            path.setAttribute("stroke-width", "3");
            path.setAttribute("fill", "none");
            svg.appendChild(path);
        }
    }

    // Initial Node Setup
    createNode('Post Distribution', 'ph-share-fat', 400, 300);
</script>
</body>
</html>
