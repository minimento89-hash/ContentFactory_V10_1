<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V10.1 — Logic Flows</title>
    
    <!-- Icons & Fonts -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    
    <!-- Design System -->
    <link rel="stylesheet" href="css/design-system.css">
    
    <style>
        .flows-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 20px 40px 100px 40px;
            overflow-y: auto;
            max-height: calc(100vh - var(--header-height));
        }

        .canvas-area {
            background: var(--glass-heavy);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            height: 500px;
            position: relative;
            overflow: hidden;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .canvas-placeholder {
            text-align: center;
            color: var(--text-dim);
        }
        .canvas-placeholder i { font-size: 3rem; margin-bottom: 15px; color: var(--accent); opacity: 0.5; }
        .canvas-placeholder h3 { font-family: 'Instrument Serif', serif; font-size: 2rem; margin-bottom: 5px; }

        .sidebar-tools {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .tool-card {
            background: var(--glass-heavy);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            cursor: grab;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .tool-card:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); }
        .tool-icon { color: var(--accent); font-size: 1.2rem; }

        .page-header-info {
            padding: 20px 40px 0 40px;
        }
        .page-header-info p { color: var(--text-dim); font-size: 0.9rem; opacity: 0.8; }
    </style>
</head>
<body class="theme-flux">

    <div class="studio-layout">
        
        <!-- SIDEBAR / COMMAND RIBBON -->
        <aside class="command-ribbon">
            <a href="studio/index.html" class="ribbon-item"><i class="ph ph-squares-four"></i></a>
            <a href="agent-lounge.html" class="ribbon-item"><i class="ph ph-users-four"></i></a>
            <div class="ribbon-item active"><i class="ph ph-graph"></i></div>
            <div class="ribbon-spacer"></div>
            <div class="ribbon-item"><i class="ph ph-gear"></i></div>
        </aside>

        <!-- MAIN AREA -->
        <main class="main-stage">
            <header class="app-header">
                <div class="header-content">
                    <h1>Logic Flows Studio</h1>
                    <div style="display: flex; gap: 20px; align-items:center;">
                        <a href="index.html" class="back-nav" style="color: var(--text-dim); text-decoration: none; font-size: 0.8rem; display: flex; align-items: center; gap: 8px;">
                            <i class="ph ph-house-line"></i> Hub
                        </a>
                        <div class="user-pill">
                            <i class="ph-fill ph-user-circle"></i>
                            <span>Il Capo</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="page-header-info">
                <p>Disegna i tuoi flussi di automazione tra agenti e piattaforme in tempo reale.</p>
            </div>

            <div class="flows-grid" id="flows-grid">
                <!-- Area Canvas Principale -->
                <div class="canvas-area" id="flow-canvas">
                    <div class="canvas-placeholder">
                        <i class="ph ph-graph"></i>
                        <h3>Editor Visuale a Nodi</h3>
                        <p>Ospiterà il motore grafico per i collegamenti logici (Phase 9)</p>
                    </div>
                </div>

                <!-- Tools Sidebar -->
                <div class="sidebar-tools">
                    <div class="tool-card" id="tool-trigger">
                        <div class="tool-icon"><i class="ph ph-lightning"></i></div>
                        <div>
                            <strong style="font-size: 0.9rem;">Trigger</strong>
                            <div style="font-size: 0.75rem; color: var(--text-dim)">Evento avvio</div>
                        </div>
                    </div>
                    <div class="tool-card" id="tool-gemini">
                        <div class="tool-icon"><i class="ph ph-sparkle"></i></div>
                        <div>
                            <strong style="font-size: 0.9rem;">Gemini Task</strong>
                            <div style="font-size: 0.75rem; color: var(--text-dim)">Elaborazione AI</div>
                        </div>
                    </div>
                    <div class="tool-card" id="tool-radar">
                        <div class="tool-icon"><i class="ph ph-broadcast"></i></div>
                        <div>
                            <strong style="font-size: 0.9rem;">Radar Feed</strong>
                            <div style="font-size: 0.75rem; color: var(--text-dim)">Input esterno</div>
                        </div>
                    </div>
                    <div class="tool-card" id="tool-end">
                        <div class="tool-icon"><i class="ph ph-check-circle"></i></div>
                        <div>
                            <strong style="font-size: 0.9rem;">Output</strong>
                            <div style="font-size: 0.75rem; color: var(--text-dim)">Fine flusso</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

    </div>

    <!-- Layout Engine Core -->
    <script src="js/core/layout-engine.js"></script>

</body>
</html>
