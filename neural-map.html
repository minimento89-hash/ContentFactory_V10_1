<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Neurale — Content Factory V10.1</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <script src="js/core/agent-core.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #050505; font-family: 'DM Sans', sans-serif; color: #f0f0f0; height: 100vh; overflow: hidden; }
        
        .topbar {
            position: fixed; top:0; left:0; right:0; z-index:200; height: 56px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 28px; background: rgba(5,5,5,0.95); border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .topbar-title { font-size: 1rem; font-weight: 800; color: #ffd700; }
        .topbar-hint { font-family: 'Fira Code', monospace; font-size: 0.58rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }
        .btn-row { display: flex; gap: 8px; }
        .btn { padding: 7px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: .2s; }
        .btn-gold { background: #ffd700; color: #000; }
        .btn-gold:hover { box-shadow: 0 4px 16px rgba(255,215,0,0.4); transform: translateY(-1px); }
        .btn-ghost { background: rgba(255,255,255,0.07); color: #aaa; border: 1px solid rgba(255,255,255,0.1); }
        .btn-ghost:hover { background: rgba(255,255,255,0.12); color: #fff; }

        #mapCanvas { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; cursor: grab; }
        #mapCanvas:active { cursor: grabbing; }

        .legend {
            position: fixed; bottom: 20px; left: 20px; z-index: 200;
            background: rgba(8,8,8,0.92); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 14px 18px; backdrop-filter: blur(20px);
        }
        .leg-title { font-family: 'Fira Code', monospace; font-size: 0.55rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .leg-item { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; color: #aaa; margin-bottom: 7px; }
        .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .leg-line { width: 22px; height: 0; border-top: 2px solid; flex-shrink: 0; }

        /* INFO PANEL */
        .panel {
            position: fixed; right: 20px; top: 70px; z-index: 200; width: 310px;
            background: rgba(8,8,8,0.96); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 25px; backdrop-filter: blur(30px);
            transform: translateX(360px); transition: transform .4s cubic-bezier(0.16,1,0.3,1); box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        .panel.open { transform: translateX(0); }
        .panel-close { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.06); border: none; color: #888; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .panel-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
        
        .panel-emoji { font-size: 2.2rem; margin-bottom: 10px; }
        .panel-name { font-size: 1.3rem; font-weight: 800; margin-bottom: 2px; }
        .panel-role { font-family: 'Fira Code', monospace; font-size: 0.6rem; color: #777; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .panel-desc { font-size: 0.8rem; color: #bbb; line-height: 1.6; margin-bottom: 20px; }
        
        .panel-section { font-family: 'Fira Code', monospace; font-size: 0.58rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 15px; }
        .panel-learn { font-size: 0.75rem; color: #ccc; margin-bottom: 8px; line-height: 1.5; display: flex; gap: 8px; }
        .panel-learn::before { content: '↻'; color: #ffd700; flex-shrink: 0; }

        .panel-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 20px; }
        .panel-tag { font-family: 'Fira Code', monospace; font-size: 0.55rem; padding: 3px 10px; border-radius: 12px; background: rgba(255,255,255,0.05); color: #888; border: 1px solid rgba(255,255,255,0.08); }

        .tt { position: fixed; z-index: 300; background: rgba(8,8,8,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 6px 12px; font-size: 0.75rem; color: #ddd; pointer-events: none; display: none; backdrop-filter: blur(12px); }
    </style>
</head>
<body>

<div class="topbar">
    <div>
        <div class="topbar-title">🧠 Mappa Neurale — Agenti Auto-Apprendenti</div>
        <div class="topbar-hint">Trascina Agenti · Scroll = zoom · Clicca per dettagli</div>
    </div>
    <div class="btn-row">
        <button class="btn btn-ghost" onclick="resetPositions()">⟲ Reset</button>
        <button class="btn btn-ghost" id="btnFlow" onclick="toggleFlow()">⚡ Flussi ON</button>
        <button class="btn btn-gold" onclick="window.location.href='index.html'">← Hub Strategico</button>
    </div>
</div>

<canvas id="mapCanvas"></canvas>

<div class="legend">
    <div class="leg-title">Legenda</div>
    <div class="leg-item"><span class="leg-dot" style="background:#ffd700;box-shadow:0 0 8px #ffd700;"></span> Orchestratore Supremo (Toni)</div>
    <div class="leg-item"><span class="leg-dot" style="background:#10b981;box-shadow:0 0 6px #10b981;"></span> Agente Online</div>
    <div class="leg-item"><span class="leg-dot" style="background:#06b6d4;"></span> In sviluppo</div>
    <div class="leg-item"><span class="leg-dot" style="background:#444;"></span> Pianificato</div>
    <div class="leg-item"><span class="leg-line" style="border-color:#ffd700;"></span> Toni comanda</div>
    <div class="leg-item"><span class="leg-line" style="border-color:#10b981;"></span> Feedback / impara</div>
</div>

<div class="panel" id="panel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-emoji" id="p-emoji">🤖</div>
    <div class="panel-name" id="p-name">Agent</div>
    <div class="panel-role" id="p-role">role</div>
    <div class="panel-desc" id="p-desc">desc</div>
    <div class="panel-section">Come impara autonomamente</div>
    <div id="p-learns"></div>
    <div class="panel-tags" id="p-tags"></div>
</div>

<div class="tt" id="tt"></div>

<script>
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    
    let W, H, CX, CY;
    let panX=0, panY=0, scale=1;
    let dragging=false, mx0=0, my0=0, px0=0, py0=0;
    let draggedNodeId = null;
    let flowOn=true;
    let particles=[];

    // Node state merged from AgentCore + LocalStorage
    let POS = JSON.parse(localStorage.getItem('neural_map_pos_v10')) || {};
    let AGENTS = {};
    let CONNS = [];

    function syncAgents() {
        const state = AgentCore.state.agents;
        const currentAgents = Object.keys(state);
        
        // Add Toni (User)
        const user = AgentCore.state.user || { name: 'Toni', avatar: 'AC' };
        AGENTS['toni'] = {
            emoji: '👑',
            name: user.name,
            role: 'Orchestratore Supremo',
            color: '#ffd700',
            r: 54,
            status: 'orchestrator',
            desc: 'Il Capo. Assegna obiettivi, approva distribuzioni, riceve report da tutti gli agenti e ricalibra la strategia.',
            learns: ['Analizza report per capire i trend','Osserva pattern di engagement','Definisce priorità operative'],
            tags: ['Strategia','Owner']
        };
        if (!POS['toni']) POS['toni'] = { x: 0, y: 0 };

        currentAgents.forEach((id, index) => {
            const agent = state[id];
            
            AGENTS[id] = {
                emoji: agent.icon_emoji || (id==='olivia'?'🌸':id==='disperazione'?'🔍':id==='cipher'?'🛡️':'🤖'),
                name: agent.name,
                role: agent.status || 'Agent',
                color: agent.color || '#10b981',
                r: id === 'olivia' ? 44 : 36,
                status: 'online',
                desc: agent.description || 'Orchestratore specializzato nel sistema Content Factory V10.1.',
                learns: agent.learns || ['Riceve feedback qualitativi','Analizza trend di mercato','Si sincronizza con il Boss'],
                tags: [agent.tag || 'SYSTEM']
            };

            if (!POS[id]) {
                const angle = (index / currentAgents.length) * Math.PI * 2;
                const radius = 280;
                POS[id] = { x: Math.cos(angle) * radius, y: Math.sin(angle) * radius };
            }
        });

        // Hardcoded connections for visual fidelity based on Cloude's version
        CONNS = [
            { from:'toni', to:'olivia', type:'command', label:'Assegna brief' },
            { from:'toni', to:'cipher', type:'command', label:'Richiede audit' },
            { from:'olivia', to:'disperazione', type:'feedback', label:'Market research' },
            { from:'disperazione', to:'olivia', type:'feedback', label:'Report ricerca' }
        ];
        
        // Dynamic connections for other agents
        currentAgents.forEach(id => {
            if(id !== 'olivia' && id !== 'disperazione' && id !== 'cipher') {
               CONNS.push({ from:'toni', to:id, type:'command', label:'Comando' });
            }
        });
    }

    function savePositions() { localStorage.setItem('neural_map_pos_v10', JSON.stringify(POS)); }
    function resetPositions() { if(confirm('Reset layout?')) { POS = {}; syncAgents(); savePositions(); draw(); } }

    function resize() {
        W = window.innerWidth; H = window.innerHeight - 56;
        canvas.width = W * devicePixelRatio; canvas.height = H * devicePixelRatio;
        ctx.scale(devicePixelRatio, devicePixelRatio);
        CX = W/2; CY = H/2;
        draw();
    }

    function world(id) {
        if(!POS[id]) return { x: CX, y: CY };
        return { x: CX + panX + POS[id].x * scale, y: CY + panY + POS[id].y * scale };
    }

    function hexAlpha(hex,a){
        const r=parseInt(hex.slice(1,3),16);
        const g=parseInt(hex.slice(3,5),16);
        const b=parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${b},${a})`;
    }

    function draw() {
        ctx.clearRect(0,0,W,H);
        drawOrbs();
        CONNS.forEach(c => drawConn(c));
        if(flowOn) drawParticles();
        Object.keys(AGENTS).forEach(id => drawNode(id));
    }

    function drawOrbs() {
        const orbs = [
            {x:0.15,y:0.2,r:280,c:'#ffd700'}, {x:0.75,y:0.1,r:220,c:'#3b82f6'},
            {x:0.6, y:0.8,r:260,c:'#10b981'}, {x:0.2, y:0.7,r:200,c:'#ec4899'}
        ];
        orbs.forEach(o => {
            const g = ctx.createRadialGradient(o.x*W,o.y*H,0,o.x*W,o.y*H,o.r);
            g.addColorStop(0, hexAlpha(o.c,0.06));
            g.addColorStop(1, hexAlpha(o.c,0));
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(o.x*W,o.y*H,o.r,0,Math.PI*2); ctx.fill();
        });
    }

    function drawConn(c) {
        const fa = AGENTS[c.from], ta = AGENTS[c.to];
        if(!fa||!ta) return;
        const fp = world(c.from), tp = world(c.to);
        const dx=tp.x-fp.x, dy=tp.y-fp.y;
        const len=Math.sqrt(dx*dx+dy*dy);
        if(len < 10) return;
        
        // Curved line logic
        const curveSize = Math.min(80, len * 0.3) * (CONNS.indexOf(c)%2===0?1:-1);
        const mx=(fp.x+tp.x)/2 - dy/len*curveSize, my=(fp.y+tp.y)/2 + dx/len*curveSize;

        ctx.beginPath(); ctx.moveTo(fp.x, fp.y); ctx.quadraticCurveTo(mx, my, tp.x, tp.y);
        ctx.strokeStyle = c.type === 'command' ? hexAlpha('#ffd700', 0.25) : hexAlpha('#10b981', 0.2);
        ctx.lineWidth = 1.5; ctx.stroke();
        
        // Label shadow box
        ctx.font = '500 10px DM Sans';
        const tw = ctx.measureText(c.label).width;
        const lx = (fp.x + tp.x) / 2 - dy/len*curveSize*0.5;
        const ly = (fp.y + tp.y) / 2 + dx/len*curveSize*0.5;
        ctx.fillStyle = 'rgba(5,5,5,0.7)';
        ctx.beginPath(); ctx.roundRect(lx-tw/2-5, ly-8, tw+10, 16, 4); ctx.fill();
        ctx.fillStyle = c.type === 'command' ? '#ffd700' : '#10b981';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(c.label, lx, ly);

        c._mx=mx; c._my=my; c._fp=fp; c._tp=tp;
    }

    function drawNode(id) {
        const a = AGENTS[id];
        const p = world(id);
        const r = a.r * scale;

        // Pulse glow
        const pulseR = r + 10 + Math.sin(Date.now()*0.003)*5;
        const g2 = ctx.createRadialGradient(p.x,p.y,r,p.x,p.y,pulseR+15);
        g2.addColorStop(0,hexAlpha(a.color,0.3)); g2.addColorStop(1,hexAlpha(a.color,0));
        ctx.fillStyle = g2; ctx.beginPath(); ctx.arc(p.x,p.y,pulseR+15,0,Math.PI*2); ctx.fill();

        // Node Circle
        const ng = ctx.createRadialGradient(p.x-r*0.3, p.y-r*0.3, 0, p.x, p.y, r);
        ng.addColorStop(0, 'rgba(35,35,40,1)'); ng.addColorStop(1, 'rgba(10,10,12,1)');
        ctx.fillStyle = ng; ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
        
        ctx.strokeStyle = hexAlpha(a.color, 0.9); ctx.lineWidth = (a.status==='orchestrator'?3:2) * scale; ctx.stroke();
        
        // Inner detail
        ctx.strokeStyle = hexAlpha(a.color, 0.1); ctx.lineWidth=1; ctx.beginPath(); ctx.arc(p.x,p.y,r-5*scale,0,Math.PI*2); ctx.stroke();

        // Text Content
        ctx.font = `${Math.max(16,r*0.55)}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillStyle = "#fff"; ctx.fillText(a.emoji, p.x, p.y-r*0.12);
        
        ctx.font = `800 ${Math.max(10,r*0.25)}px DM Sans`; ctx.fillText(a.name, p.x, p.y+r*0.25);
        
        // Status Pill
        const st = a.status === 'orchestrator' ? 'boss' : 'live';
        const sw = 30*scale, sh = 14*scale;
        ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.strokeStyle=hexAlpha(a.color,0.5); ctx.lineWidth=1;
        ctx.beginPath(); ctx.roundRect(p.x-sw/2, p.y+r+4*scale, sw, sh, 6); ctx.fill(); ctx.stroke();
        ctx.font = `700 ${8*scale}px Fira Code`; ctx.fillStyle=a.color; ctx.fillText(st, p.x, p.y+r+sh/2+4*scale);
    }

    function spawnParticle() {
        if(!CONNS.length) return;
        const c = CONNS[Math.floor(Math.random()*CONNS.length)];
        particles.push({ c, t:0, speed:0.005, color:AGENTS[c.from].color });
    }

    function drawParticles() {
        particles = particles.filter(p=>p.t<1);
        particles.forEach(p=>{
            p.t += p.speed;
            const c=p.c; if(!c._fp||!c._tp) return;
            const t=p.t; const x=(1-t)*(1-t)*c._fp.x+2*(1-t)*t*c._mx+t*t*c._tp.x;
            const y=(1-t)*(1-t)*c._fp.y+2*(1-t)*t*c._my+t*t*c._tp.y;
            ctx.beginPath(); ctx.arc(x,y,2.5,0,Math.PI*2); ctx.fillStyle=p.color; ctx.shadowBlur=8; ctx.shadowColor=p.color; ctx.fill(); ctx.shadowBlur=0;
        });
    }

    function hitNode(mx, my) {
        const ids = Object.keys(AGENTS);
        for(let i=ids.length-1; i>=0; i--){
            const id = ids[i];
            const p=world(id); const r=AGENTS[id].r*scale+15;
            const dx=mx-p.x, dy=my-p.y;
            if(dx*dx+dy*dy <= r*r) return id;
        }
        return null;
    }

    canvas.addEventListener('mousedown', e=>{
        const rect=canvas.getBoundingClientRect();
        const x=e.clientX-rect.left, y=e.clientY-rect.top;
        draggedNodeId = hitNode(x,y);
        if(!draggedNodeId) { dragging=true; mx0=e.clientX; my0=e.clientY; px0=panX; py0=panY; }
        else { canvas.style.cursor='grabbing'; }
    });

    window.addEventListener('mousemove', e=>{
        const rect=canvas.getBoundingClientRect();
        const x = e.clientX-rect.left; const y = e.clientY-rect.top;
        if(draggedNodeId) {
            POS[draggedNodeId].x = (x - CX - panX) / scale;
            POS[draggedNodeId].y = (y - CY - panY) / scale;
            return;
        }
        if(dragging){ panX=px0+(e.clientX-mx0); panY=py0+(e.clientY-my0); return; }
        const hit=hitNode(x, y); canvas.style.cursor = hit ? 'pointer' : dragging ? 'grabbing' : 'grab';
        const tt = document.getElementById('tt');
        tt.style.display = hit ? 'block' : 'none';
        if(hit) { tt.style.left=(e.clientX+20)+'px'; tt.style.top=(e.clientY-10)+'px'; tt.textContent=AGENTS[hit].name+' — '+AGENTS[hit].role; }
    });

    window.addEventListener('mouseup', ()=>{ if(draggedNodeId) savePositions(); draggedNodeId=null; dragging=false; });

    canvas.addEventListener('click', e=>{
        const rect=canvas.getBoundingClientRect();
        const x=e.clientX-rect.left, y=e.clientY-rect.top;
        const hit=hitNode(x,y);
        if(hit) openPanel(hit);
    });

    canvas.addEventListener('wheel', e=>{
        e.preventDefault(); scale = Math.max(0.2, Math.min(4, scale * (e.deltaY>0?0.9:1.11))); draw();
    },{passive:false});

    function openPanel(id) {
        const a=AGENTS[id];
        document.getElementById('p-emoji').textContent=a.emoji;
        document.getElementById('p-name').textContent=a.name;
        document.getElementById('p-role').textContent=a.role;
        document.getElementById('p-desc').textContent=a.desc;
        document.getElementById('p-learns').innerHTML=a.learns.map(l=>`<div class="panel-learn">${l}</div>`).join('');
        document.getElementById('p-tags').innerHTML=a.tags.map(t=>`<span class="panel-tag">${t}</span>`).join('');
        document.getElementById('panel').classList.add('open');
    }
    function closePanel(){ document.getElementById('panel').classList.remove('open'); }
    function toggleFlow(){ flowOn=!flowOn; draw(); }

    function loop(ts) {
        if(flowOn && Math.random() < 0.08) spawnParticle();
        draw(); requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    syncAgents();
    resize();
    requestAnimationFrame(loop);
</script>
</body>
</html>
