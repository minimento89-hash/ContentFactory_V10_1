<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Loop — Content Factory V10.1</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Instrument+Serif:ital@0;1&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="js/core/agent-core.js"></script>
    <script src="js/core/ui-engine.js"></script>
    
    <style>
        :root {
            --accent: #ffd700;
            --bg: #050505;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f0f0f0;
            --text-dim: #666;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 20-ORB BACKGROUND */
        .orb-bg {
            position: fixed; inset: 0; z-index: -1;
            background: #000; overflow: hidden;
        }
        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.15;
            animation: orbFloat 25s infinite alternate ease-in-out;
        }
        @keyframes orbFloat {
            from { transform: translate(0,0) scale(1); }
            to { transform: translate(120px, 60px) scale(1.3); }
        }

        .container {
            max-width: 1200px; margin: 0 auto; padding: 60px 30px;
            display: flex; flex-direction: column; align-items: center;
            position: relative; z-index: 10;
        }

        .header { text-align: center; margin-bottom: 60px; }
        .header h1 { font-family: 'Instrument Serif', serif; font-size: 4rem; line-height: 1; margin-bottom: 10px; }
        .header p { font-family: 'Fira Code', monospace; font-size: 0.65rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.4em; }

        .btn-back {
            position: fixed; top: 40px; left: 40px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 12px 24px; border-radius: 50px; color: #fff; text-decoration: none;
            font-size: 0.75rem; font-weight: 700; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-back:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.3); transform: translateX(-3px); }

        .feed-container {
            width: 100%; max-width: 480px;
            display: flex; flex-direction: column; gap: 40px;
        }

        .social-card {
            background: var(--surface); backdrop-filter: blur(40px);
            border: 1px solid var(--border); border-radius: 32px;
            overflow: hidden; position: relative;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .social-card:hover { border-color: var(--accent); transform: scale(1.01); }

        .card-media {
            width: 100%; height: 580px; background: #000;
            position: relative; overflow: hidden;
        }
        .card-media img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }

        .card-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent 50%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 35px;
        }

        .card-info h3 { font-size: 1.3rem; font-weight: 800; color: #fff; }
        .card-info p { margin-top: 10px; font-size: 0.9rem; color: #bbb; line-height: 1.5; }

        .hype-badge {
            position: absolute; top: 25px; right: 25px;
            background: rgba(255, 215, 0, 0.2); border: 1px solid rgba(255, 215, 0, 0.4);
            color: var(--accent); padding: 8px 16px; border-radius: 20px;
            font-size: 0.7rem; font-weight: 800; letter-spacing: 0.1em;
            backdrop-filter: blur(15px);
        }

        .card-stats {
            position: absolute; right: 20px; bottom: 120px;
            display: flex; flex-direction: column; align-items: center; gap: 25px;
        }
        .stat-item {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.7);
        }
        .stat-item:hover { color: var(--accent); transform: scale(1.2); }
        .stat-item i { font-size: 1.8rem; }
        .stat-item span { font-size: 0.65rem; font-weight: 800; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

<div class="orb-bg" id="orb-container"></div>

<a href="index.html" class="btn-back">← Hub Strategico</a>

<div class="container">
    <header class="header">
        <h1>Social Loop</h1>
        <p>Community Resonance — V10.1</p>
    </header>

    <main class="feed-container" id="feed-container">
        <!-- Dynamic Feed -->
    </main>
</div>

<script>
    // 20-ORB ENGINE
    const orbContainer = document.getElementById('orb-container');
    const colors = ['#ffd700', '#ec4899', '#8b5cf6', '#3b82f6'];
    for (let i = 0; i < 20; i++) {
        const orb = document.createElement('div');
        orb.className = 'orb';
        const size = Math.random() * 400 + 200;
        orb.style.width = size + 'px';
        orb.style.height = size + 'px';
        orb.style.left = Math.random() * 100 + '%';
        orb.style.top = Math.random() * 100 + '%';
        orb.style.background = colors[Math.floor(Math.random() * colors.length)];
        orbContainer.appendChild(orb);
    }

    const FEED_DATA = [
        {
            title: "Neural Branding Concept",
            desc: "Exploring the intersection of AI design and kinetic typography. #ContentFactory #V10",
            img: "https://images.unsplash.com/photo-1611162617474-5b21e879e113?auto=format&fit=crop&q=80&w=480&h=600",
            likes: "12.8K", shares: "2.4K", comments: "312"
        },
        {
            title: "Aura's Workspace Reveal",
            desc: "Inside the creative hive of our leading AI Architect. #AIArchitecture #StudioV10",
            img: "https://images.unsplash.com/photo-1611605698335-8b1569810432?auto=format&fit=crop&q=80&w=480&h=600",
            likes: "8.4K", shares: "1.2K", comments: "156"
        }
    ];

    function renderFeed() {
        const container = document.getElementById('feed-container');
        const hype = AgentCore.state.sentiment?.hypeScore?.toFixed(1) || '98.4';
        
        container.innerHTML = FEED_DATA.map(item => `
            <div class="social-card">
                <div class="hype-badge">HYPE: ${hype}%</div>
                <div class="card-media">
                    <img src="${item.img}" alt="${item.title}">
                    <div class="card-overlay">
                        <div class="card-info">
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                        </div>
                    </div>
                </div>
                <div class="card-stats">
                    <div class="stat-item"><i class="ph-fill ph-heart"></i><span>${item.likes}</span></div>
                    <div class="stat-item"><i class="ph-fill ph-paper-plane-tilt"></i><span>${item.shares}</span></div>
                    <div class="stat-item"><i class="ph-fill ph-chat-circle"></i><span>${item.comments}</span></div>
                </div>
            </div>
        `).join('');
    }

    // REACTIVE SYNC
    window.addEventListener('agent:sentimentUpdate', renderFeed);

    window.addEventListener('load', renderFeed);
</script>
</body>
</html>
