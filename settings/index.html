<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurazione — Content Factory V10.1</title>
    
    <!-- Icons & Fonts -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    
    <!-- Design System -->
    <link rel="stylesheet" href="../css/design-system.css">
    
    <style>
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 20px 40px 100px 40px;
            overflow-y: auto;
            max-height: calc(100vh - var(--header-height));
        }

        .settings-card {
            background: var(--glass-heavy);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 30px;
            max-width: 800px;
        }

        .setting-group { margin-bottom: 25px; }

        .setting-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        input:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.05); }

        .save-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(232, 197, 71, 0.3); }

        .page-header-info {
            padding: 20px 40px 0 40px;
        }
        .page-header-info p { color: var(--text-dim); font-size: 0.9rem; opacity: 0.8; }
    </style>
</head>
<body class="theme-flux">

    <div class="studio-layout">
        
        <!-- SIDEBAR / COMMAND RIBBON -->
        <aside class="command-ribbon">
            <a href="../studio/index.html" class="ribbon-item"><i class="ph ph-squares-four"></i></a>
            <a href="../agent-lounge.html" class="ribbon-item"><i class="ph ph-users-four"></i></a>
            <a href="../logic-flows.html" class="ribbon-item"><i class="ph ph-graph"></i></a>
            <div class="ribbon-spacer"></div>
            <div class="ribbon-item active"><i class="ph ph-gear"></i></div>
        </aside>

        <!-- MAIN AREA -->
        <main class="main-stage">
            <header class="app-header">
                <div class="header-content">
                    <h1>Configurazione Core</h1>
                    <div style="display: flex; gap: 20px; align-items:center;">
                        <a href="../index.html" class="back-nav" style="color: var(--text-dim); text-decoration: none; font-size: 0.8rem; display: flex; align-items: center; gap: 8px;">
                            <i class="ph ph-house-line"></i> Hub
                        </a>
                        <div class="user-pill">
                            <i class="ph-fill ph-user-circle"></i>
                            <span>Il Capo</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="page-header-info">
                <p>Gestisci le chiavi API e le integrazioni del tuo ecosistema AI.</p>
            </div>

            <div class="settings-grid" id="settings-grid">
                <div class="settings-card">
                    <div class="setting-group" id="set-gemini">
                        <label class="setting-label">Gemini API Key</label>
                        <input type="password" id="gemini-key" placeholder="Incolla la tua chiave API qui...">
                    </div>

                    <div class="setting-group" id="set-firebase">
                        <label class="setting-label">Firebase Config (JSON)</label>
                        <textarea id="firebase-config" rows="6" placeholder='{ "apiKey": "...", "authDomain": "...", ... }'></textarea>
                    </div>

                    <button class="save-btn" onclick="saveSettings()">Salva Configurazione</button>
                    <p id="status" style="margin-top: 15px; font-size: 0.8rem; opacity: 0.7;"></p>
                </div>
            </div>
        </main>

    </div>

    <script>
        // Carica impostazioni esistenti
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('gemini-key').value = localStorage.getItem('v10_gemini_key') || '';
            document.getElementById('firebase-config').value = localStorage.getItem('v10_firebase_config') || '';
        });

        function saveSettings() {
            const geminiKey = document.getElementById('gemini-key').value.trim();
            const firebaseConfig = document.getElementById('firebase-config').value.trim();
            const status = document.getElementById('status');

            localStorage.setItem('v10_gemini_key', geminiKey);
            localStorage.setItem('v10_firebase_config', firebaseConfig);

            status.textContent = "✓ Configurazione salvata con successo";
            status.style.color = "#10b981";

            setTimeout(() => { status.textContent = ""; }, 3000);
        }
    </script>

    <!-- Layout Engine Core -->
    <script src="../js/core/layout-engine.js"></script>

</body>
</html>
